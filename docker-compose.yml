version: '3.8'

services:
  db:
    image: postgres:16
    container_name: educasolidario_db
    restart: always
    environment:
      POSTGRES_DB: educasolidario
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./DB/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - educasolidario_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./App
      dockerfile: Dockerfile
    container_name: educasolidario_web
    restart: always
    ports:
      - "80:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/educasolidario
      FLASK_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - educasolidario_net

volumes:
  postgres_data:

networks:
  educasolidario_net:
    driver: bridge
